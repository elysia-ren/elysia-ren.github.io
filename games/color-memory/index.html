<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>色彩序列记忆 | 游戏花园</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1028;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100dvh;font-family:'Segoe UI',sans-serif;color:#e8d5f5;overflow:hidden;touch-action:none}
.top-bar{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:10px 16px;background:rgba(26,16,40,.9);z-index:10}
.back-btn{background:linear-gradient(135deg,#D8A3E0,#FFE0E9);color:#fff;border:none;border-radius:50px;padding:8px 16px;font-size:.85rem;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:6px}
.info{display:flex;gap:16px;font-size:.95rem;font-weight:600}
.game-area{display:flex;flex-direction:column;align-items:center;gap:20px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.cell{width:90px;height:90px;border-radius:16px;cursor:pointer;transition:all .15s ease;border:3px solid transparent;opacity:.6}
.cell.active{opacity:1;transform:scale(1.05);box-shadow:0 0 30px rgba(255,255,255,.3)}
.cell:hover{opacity:.85}
.msg{font-size:1.1rem;font-weight:600;min-height:30px;color:#D8A3E0}
.overlay{position:fixed;inset:0;background:rgba(26,16,40,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;backdrop-filter:blur(6px)}
.overlay h1{font-size:2rem;margin-bottom:10px;background:linear-gradient(to right,#D8A3E0,#FFE0E9);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.overlay p{color:#b8a5cc;margin-bottom:20px}
.overlay button{background:linear-gradient(135deg,#D8A3E0,#FFE0E9);color:#fff;border:none;border-radius:50px;padding:14px 36px;font-size:1.1rem;cursor:pointer;font-weight:600}
@media(max-width:400px){.cell{width:75px;height:75px}}
</style>
</head>
<body>
<div class="top-bar">
  <a href="../../games.html" class="back-btn"><i class="fas fa-arrow-left"></i> 返回</a>
  <div class="info"><span>关卡: <span id="level">1</span></span><span>失误: <span id="misses">0</span>/3</span></div>
</div>
<div class="game-area">
  <div class="grid" id="grid"></div>
  <div class="msg" id="msg">准备开始...</div>
</div>
<div class="overlay" id="startScreen">
  <h1>色彩序列记忆</h1>
  <p>观察闪烁的颜色顺序 · 点击复刻序列<br>三次失误结束 · 关卡递增难度</p>
  <button onclick="startGame()">开始游戏</button>
</div>
<div class="overlay" id="overScreen" style="display:none">
  <h1>游戏结束</h1>
  <p>到达第 <span id="finalLevel">1</span> 关</p>
  <button onclick="startGame()">再来一局</button>
</div>
<script>
/* ========== 色彩序列记忆 ========== */
const COLORS = [
  '#D8A3E0', '#A6D1FF', '#FFE0E9',
  '#A3D9B1', '#FFB347', '#FF6B8A',
  '#87CEEB', '#DDA0DD', '#98D8C8'
];
const grid = document.getElementById('grid');
const msg = document.getElementById('msg');
let sequence, userInput, level, misses, accepting, cells;

/* 初始化网格 */
function initGrid() {
  grid.innerHTML = '';
  cells = [];
  for (let i = 0; i < 9; i++) {
    const div = document.createElement('div');
    div.className = 'cell';
    div.style.background = COLORS[i];
    div.dataset.index = i;
    div.addEventListener('click', () => onCellClick(i));
    div.addEventListener('touchstart', e => { e.preventDefault(); onCellClick(i); });
    grid.appendChild(div);
    cells.push(div);
  }
}

function startGame() {
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('overScreen').style.display = 'none';
  initGrid();
  sequence = []; level = 1; misses = 0; accepting = false;
  document.getElementById('level').textContent = '1';
  document.getElementById('misses').textContent = '0';
  nextRound();
}

function nextRound() {
  accepting = false;
  userInput = [];
  // 添加新的随机颜色
  sequence.push(Math.floor(Math.random() * 9));
  msg.textContent = `观察序列 (${sequence.length} 步)...`;
  playSequence();
}

/* 播放序列 */
async function playSequence() {
  await sleep(500);
  for (let i = 0; i < sequence.length; i++) {
    const idx = sequence[i];
    cells[idx].classList.add('active');
    await sleep(400 - Math.min(level * 10, 200));
    cells[idx].classList.remove('active');
    await sleep(150);
  }
  accepting = true;
  msg.textContent = '请复刻序列！';
}

/* 玩家点击 */
function onCellClick(idx) {
  if (!accepting) return;
  const expected = sequence[userInput.length];

  // 闪烁反馈
  cells[idx].classList.add('active');
  setTimeout(() => cells[idx].classList.remove('active'), 200);

  if (idx === expected) {
    userInput.push(idx);
    if (userInput.length === sequence.length) {
      // 成功
      accepting = false;
      msg.textContent = '✅ 正确！';
      level++;
      document.getElementById('level').textContent = level;
      setTimeout(nextRound, 800);
    }
  } else {
    // 失误
    misses++;
    document.getElementById('misses').textContent = misses;
    if (misses >= 3) {
      accepting = false;
      document.getElementById('finalLevel').textContent = level;
      document.getElementById('overScreen').style.display = 'flex';
    } else {
      msg.textContent = `❌ 错误！还剩 ${3 - misses} 次机会`;
      userInput = [];
      setTimeout(() => playSequence(), 1000);
    }
  }
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
</script>
</body>
</html>
