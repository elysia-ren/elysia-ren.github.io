<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>迷宫脉冲寻宝 | 游戏花园</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1028;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100dvh;font-family:'Segoe UI',sans-serif;color:#e8d5f5;overflow:hidden;touch-action:none}
.top-bar{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:10px 16px;background:rgba(26,16,40,.9);z-index:10}
.back-btn{background:linear-gradient(135deg,#D8A3E0,#FFE0E9);color:#fff;border:none;border-radius:50px;padding:8px 16px;font-size:.85rem;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:6px}
.info{display:flex;gap:16px;font-size:.95rem;font-weight:600}
canvas{border-radius:12px;box-shadow:0 0 40px rgba(216,163,224,.3)}
.overlay{position:fixed;inset:0;background:rgba(26,16,40,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;backdrop-filter:blur(6px)}
.overlay h1{font-size:2rem;margin-bottom:10px;background:linear-gradient(to right,#D8A3E0,#FFE0E9);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.overlay p{color:#b8a5cc;margin-bottom:20px;text-align:center;line-height:1.6}
.overlay button{background:linear-gradient(135deg,#D8A3E0,#FFE0E9);color:#fff;border:none;border-radius:50px;padding:14px 36px;font-size:1.1rem;cursor:pointer;font-weight:600}
.mobile-ctrl{position:fixed;bottom:20px;display:none;z-index:5}
.mobile-ctrl.visible{display:flex}
.ctrl-grid{display:grid;grid-template-columns:repeat(3,56px);grid-template-rows:repeat(3,56px);gap:4px}
.ctrl-grid .d-btn:nth-child(1){grid-area:1/2}
.ctrl-grid .d-btn:nth-child(2){grid-area:2/1}
.ctrl-grid .d-btn:nth-child(3){grid-area:2/3}
.ctrl-grid .d-btn:nth-child(4){grid-area:3/2}
.d-btn{width:56px;height:56px;background:rgba(216,163,224,.15);border:2px solid rgba(216,163,224,.3);border-radius:14px;color:#D8A3E0;font-size:1.2rem;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none}
.d-btn:active{background:rgba(216,163,224,.35)}
</style>
</head>
<body>
<div class="top-bar">
  <a href="../../games.html" class="back-btn"><i class="fas fa-arrow-left"></i> 返回</a>
  <div class="info"><span>步数: <span id="steps">0</span></span><span>关卡: <span id="level">1</span></span></div>
</div>
<canvas id="gc"></canvas>
<div class="overlay" id="startScreen">
  <h1>迷宫脉冲寻宝</h1>
  <p>方向键/WASD/滑动操控 · 到达金色终点<br>蓝色区域减速 · 紫色传送门随机传送</p>
  <button onclick="startGame()">开始游戏</button>
</div>
<div class="overlay" id="winScreen" style="display:none">
  <h1>🎉 通关成功！</h1>
  <p>步数: <span id="winSteps">0</span></p>
  <button onclick="nextLevel()">下一关</button>
</div>
<div class="mobile-ctrl" id="mobileCtrl">
  <div class="ctrl-grid">
    <div class="d-btn" data-dir="up"><i class="fas fa-chevron-up"></i></div>
    <div class="d-btn" data-dir="left"><i class="fas fa-chevron-left"></i></div>
    <div class="d-btn" data-dir="right"><i class="fas fa-chevron-right"></i></div>
    <div class="d-btn" data-dir="down"><i class="fas fa-chevron-down"></i></div>
  </div>
</div>
<script>
/* ========== 迷宫脉冲寻宝 ========== */
const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');
let CELL, COLS, ROWS, maze, player, goal, portals, slowZones, steps, level;

function resize() {
  const s = Math.min(window.innerWidth - 20, window.innerHeight - 160, 500);
  canvas.width = canvas.height = s;
}
resize();
window.addEventListener('resize', resize);

/* 生成迷宫 (DFS) */
function generateMaze(cols, rows) {
  // 初始化：全部墙
  const grid = Array.from({length: rows}, () => Array.from({length: cols}, () => ({
    visited: false, walls: { top: true, right: true, bottom: true, left: true }
  })));

  const stack = [];
  const start = [0, 0];
  grid[0][0].visited = true;
  stack.push(start);

  while (stack.length) {
    const [cx, cy] = stack[stack.length - 1];
    const neighbors = [];
    if (cy > 0 && !grid[cy-1][cx].visited) neighbors.push([cx, cy-1, 'top', 'bottom']);
    if (cx < cols-1 && !grid[cy][cx+1].visited) neighbors.push([cx+1, cy, 'right', 'left']);
    if (cy < rows-1 && !grid[cy+1][cx].visited) neighbors.push([cx, cy+1, 'bottom', 'top']);
    if (cx > 0 && !grid[cy][cx-1].visited) neighbors.push([cx-1, cy, 'left', 'right']);

    if (neighbors.length) {
      const [nx, ny, wallA, wallB] = neighbors[Math.floor(Math.random() * neighbors.length)];
      grid[cy][cx].walls[wallA] = false;
      grid[ny][nx].walls[wallB] = false;
      grid[ny][nx].visited = true;
      stack.push([nx, ny]);
    } else {
      stack.pop();
    }
  }
  return grid;
}

function startGame() {
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('winScreen').style.display = 'none';
  document.getElementById('mobileCtrl').classList.add('visible');
  level = 1;
  initLevel();
}

function nextLevel() {
  document.getElementById('winScreen').style.display = 'none';
  level++;
  initLevel();
}

function initLevel() {
  resize();
  COLS = ROWS = 8 + Math.min(level - 1, 7); // 递增迷宫大小
  CELL = Math.floor(canvas.width / (COLS + 1));
  canvas.width = canvas.height = CELL * (COLS + 1);

  maze = generateMaze(COLS, ROWS);
  player = { x: 0, y: 0 };
  goal = { x: COLS - 1, y: ROWS - 1 };
  steps = 0;

  // 生成减速区域
  slowZones = [];
  const zoneCount = 2 + level;
  for (let i = 0; i < zoneCount; i++) {
    let zx, zy;
    do { zx = Math.floor(Math.random() * COLS); zy = Math.floor(Math.random() * ROWS); }
    while ((zx === 0 && zy === 0) || (zx === goal.x && zy === goal.y) || slowZones.some(z => z.x === zx && z.y === zy));
    slowZones.push({ x: zx, y: zy });
  }

  // 生成传送门（成对）
  portals = [];
  const portalPairs = Math.min(1 + Math.floor(level / 2), 3);
  for (let i = 0; i < portalPairs; i++) {
    let a, b;
    do {
      a = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
      b = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
    } while (a.x === b.x && a.y === b.y || (a.x===0&&a.y===0) || (b.x===0&&b.y===0));
    portals.push({ a, b, color: `hsl(${i*120+260},70%,65%)` });
  }

  document.getElementById('steps').textContent = '0';
  document.getElementById('level').textContent = level;
  draw();
}

/* 移动 */
function tryMove(dx, dy) {
  const { x, y } = player;
  const cell = maze[y][x];

  // 墙壁检测
  if (dx === -1 && cell.walls.left) return;
  if (dx === 1 && cell.walls.right) return;
  if (dy === -1 && cell.walls.top) return;
  if (dy === 1 && cell.walls.bottom) return;

  player.x += dx; player.y += dy;
  steps++;

  // 减速区域检测
  if (slowZones.some(z => z.x === player.x && z.y === player.y)) {
    // 减速效果：额外扣步
    steps += 1;
  }

  // 传送门检测
  for (const p of portals) {
    if (player.x === p.a.x && player.y === p.a.y) {
      player.x = p.b.x; player.y = p.b.y;
      break;
    }
    if (player.x === p.b.x && player.y === p.b.y) {
      player.x = p.a.x; player.y = p.a.y;
      break;
    }
  }

  document.getElementById('steps').textContent = steps;
  draw();

  // 到达终点
  if (player.x === goal.x && player.y === goal.y) {
    document.getElementById('winSteps').textContent = steps;
    document.getElementById('winScreen').style.display = 'flex';
  }
}

/* 键盘控制 */
document.addEventListener('keydown', e => {
  const map = { ArrowUp:[0,-1], ArrowDown:[0,1], ArrowLeft:[-1,0], ArrowRight:[1,0], w:[0,-1], s:[0,1], a:[-1,0], d:[1,0] };
  if (map[e.key]) { e.preventDefault(); tryMove(...map[e.key]); }
});

/* 方向按钮 */
document.querySelectorAll('.d-btn').forEach(btn => {
  const map = { up:[0,-1], down:[0,1], left:[-1,0], right:[1,0] };
  const handler = e => { e.preventDefault(); tryMove(...map[btn.dataset.dir]); };
  btn.addEventListener('touchstart', handler);
  btn.addEventListener('mousedown', handler);
});

/* 触屏滑动 */
let tx, ty;
canvas.addEventListener('touchstart', e => { tx = e.touches[0].clientX; ty = e.touches[0].clientY; });
canvas.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  const dy = e.changedTouches[0].clientY - ty;
  if (Math.abs(dx) + Math.abs(dy) < 20) return;
  if (Math.abs(dx) > Math.abs(dy)) tryMove(dx > 0 ? 1 : -1, 0);
  else tryMove(0, dy > 0 ? 1 : -1);
});

/* 绘制 */
function draw() {
  const w = canvas.width, h = canvas.height;
  ctx.fillStyle = '#1a1028';
  ctx.fillRect(0, 0, w, h);

  const ox = Math.floor((w - COLS * CELL) / 2);
  const oy = Math.floor((h - ROWS * CELL) / 2);

  // 绘制减速区域
  slowZones.forEach(z => {
    ctx.fillStyle = 'rgba(100,140,255,.12)';
    ctx.fillRect(ox + z.x * CELL, oy + z.y * CELL, CELL, CELL);
  });

  // 绘制传送门
  portals.forEach(p => {
    [p.a, p.b].forEach(pt => {
      ctx.fillStyle = p.color;
      ctx.globalAlpha = 0.3 + 0.2 * Math.sin(Date.now() / 300);
      ctx.beginPath();
      ctx.arc(ox + pt.x * CELL + CELL/2, oy + pt.y * CELL + CELL/2, CELL/3, 0, Math.PI*2);
      ctx.fill();
      ctx.globalAlpha = 1;
    });
  });

  // 绘制迷宫墙壁
  ctx.strokeStyle = '#D8A3E0';
  ctx.lineWidth = 2;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = maze[r][c];
      const x = ox + c * CELL, y = oy + r * CELL;
      if (cell.walls.top) { ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x + CELL, y); ctx.stroke(); }
      if (cell.walls.right) { ctx.beginPath(); ctx.moveTo(x + CELL, y); ctx.lineTo(x + CELL, y + CELL); ctx.stroke(); }
      if (cell.walls.bottom) { ctx.beginPath(); ctx.moveTo(x, y + CELL); ctx.lineTo(x + CELL, y + CELL); ctx.stroke(); }
      if (cell.walls.left) { ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x, y + CELL); ctx.stroke(); }
    }
  }

  // 绘制终点（金色脉冲）
  const pulse = 0.5 + 0.5 * Math.sin(Date.now() / 250);
  ctx.fillStyle = `rgba(255,215,0,${pulse * 0.4})`;
  ctx.fillRect(ox + goal.x * CELL, oy + goal.y * CELL, CELL, CELL);
  ctx.fillStyle = '#FFD700';
  ctx.beginPath();
  ctx.arc(ox + goal.x * CELL + CELL/2, oy + goal.y * CELL + CELL/2, CELL/4, 0, Math.PI*2);
  ctx.fill();

  // 绘制玩家
  ctx.fillStyle = '#FFE0E9';
  ctx.beginPath();
  ctx.arc(ox + player.x * CELL + CELL/2, oy + player.y * CELL + CELL/2, CELL/3, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#D8A3E0';
  ctx.beginPath();
  ctx.arc(ox + player.x * CELL + CELL/2, oy + player.y * CELL + CELL/2, CELL/6, 0, Math.PI*2);
  ctx.fill();
}
</script>
</body>
</html>
