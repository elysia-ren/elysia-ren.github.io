<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>数字融合方阵 | 游戏花园</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1028;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100dvh;font-family:'Segoe UI',sans-serif;color:#e8d5f5;overflow:hidden;touch-action:none}
.top-bar{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:10px 16px;background:rgba(26,16,40,.9);z-index:10}
.back-btn{background:linear-gradient(135deg,#D8A3E0,#FFE0E9);color:#fff;border:none;border-radius:50px;padding:8px 16px;font-size:.85rem;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:6px}
.info{display:flex;gap:16px;font-size:.95rem;font-weight:600}
.game-area{display:flex;flex-direction:column;align-items:center;gap:16px}
.board{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:12px;background:rgba(216,163,224,.1);border-radius:16px;box-shadow:0 0 30px rgba(216,163,224,.2)}
.tile{width:70px;height:70px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1.4rem;transition:all .15s ease;user-select:none}
.overlay{position:fixed;inset:0;background:rgba(26,16,40,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;backdrop-filter:blur(6px)}
.overlay h1{font-size:2rem;margin-bottom:10px;background:linear-gradient(to right,#D8A3E0,#FFE0E9);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.overlay p{color:#b8a5cc;margin-bottom:20px}
.overlay button{background:linear-gradient(135deg,#D8A3E0,#FFE0E9);color:#fff;border:none;border-radius:50px;padding:14px 36px;font-size:1.1rem;cursor:pointer;font-weight:600}
.mobile-hint{color:#8A7B99;font-size:.85rem;margin-top:8px}
@media(max-width:400px){.tile{width:60px;height:60px;font-size:1.2rem}}
</style>
</head>
<body>
<div class="top-bar">
  <a href="../../games.html" class="back-btn"><i class="fas fa-arrow-left"></i> 返回</a>
  <div class="info"><span>得分: <span id="score">0</span></span><span>目标: <span id="target">2048</span></span></div>
</div>
<div class="game-area">
  <div class="board" id="board"></div>
  <div class="mobile-hint">↑↓←→ / WASD / 滑动操控</div>
</div>
<div class="overlay" id="startScreen">
  <h1>数字融合方阵</h1>
  <p>滑动合并相同数字 · 达成目标分数即胜利</p>
  <button onclick="startGame()">开始游戏</button>
</div>
<div class="overlay" id="winScreen" style="display:none">
  <h1>🎉 达成目标！</h1>
  <p>得分: <span id="winScore">0</span></p>
  <button onclick="startGame()">再来一局</button>
</div>
<div class="overlay" id="loseScreen" style="display:none">
  <h1>游戏结束</h1>
  <p>得分: <span id="loseScore">0</span></p>
  <button onclick="startGame()">再来一局</button>
</div>
<script>
/* ========== 数字融合方阵 (2048变种) ========== */
let grid, score, won;
const TARGET = 2048;
const board = document.getElementById('board');

/* 方块颜色映射 */
function tileColor(v) {
  const map = {
    0:'rgba(216,163,224,.08)', 2:'#EBD4F0', 4:'#D8C0E8', 8:'#C8A8E0',
    16:'#B890D8', 32:'#A878D0', 64:'#9860C8', 128:'#8848C0',
    256:'#7830B8', 512:'#6820B0', 1024:'#5810A8', 2048:'#D8A3E0',
    4096:'#FFE0E9', 8192:'#A6D1FF'
  };
  return map[v] || '#FFD700';
}
function tileTextColor(v) { return v <= 4 ? '#5A4B6E' : '#fff'; }

/* 渲染棋盘 */
function render() {
  board.innerHTML = '';
  for (let r = 0; r < 4; r++) {
    for (let c = 0; c < 4; c++) {
      const v = grid[r][c];
      const div = document.createElement('div');
      div.className = 'tile';
      div.style.background = tileColor(v);
      div.style.color = tileTextColor(v);
      div.textContent = v || '';
      board.appendChild(div);
    }
  }
  document.getElementById('score').textContent = score;
}

/* 初始化 */
function init() {
  grid = Array.from({length:4}, () => Array(4).fill(0));
  score = 0; won = false;
  spawn(); spawn(); render();
}

function spawn() {
  const empty = [];
  for (let r = 0; r < 4; r++)
    for (let c = 0; c < 4; c++)
      if (!grid[r][c]) empty.push([r, c]);
  if (!empty.length) return;
  const [r, c] = empty[Math.floor(Math.random() * empty.length)];
  grid[r][c] = Math.random() < 0.9 ? 2 : 4;
}

/* 滑动合并 */
function slide(row) {
  let arr = row.filter(v => v);
  for (let i = 0; i < arr.length - 1; i++) {
    if (arr[i] === arr[i + 1]) { arr[i] *= 2; score += arr[i]; arr.splice(i + 1, 1); }
  }
  while (arr.length < 4) arr.push(0);
  return arr;
}

function move(dir) {
  let moved = false;
  const old = JSON.stringify(grid);

  if (dir === 'left') {
    for (let r = 0; r < 4; r++) grid[r] = slide(grid[r]);
  } else if (dir === 'right') {
    for (let r = 0; r < 4; r++) grid[r] = slide(grid[r].reverse()).reverse();
  } else if (dir === 'up') {
    for (let c = 0; c < 4; c++) {
      let col = [grid[0][c], grid[1][c], grid[2][c], grid[3][c]];
      col = slide(col);
      for (let r = 0; r < 4; r++) grid[r][c] = col[r];
    }
  } else if (dir === 'down') {
    for (let c = 0; c < 4; c++) {
      let col = [grid[3][c], grid[2][c], grid[1][c], grid[0][c]];
      col = slide(col);
      for (let r = 0; r < 4; r++) grid[3 - r][c] = col[r];
    }
  }

  if (JSON.stringify(grid) !== old) {
    moved = true;
    spawn();
    render();
    // 检测胜利
    if (!won && grid.some(row => row.some(v => v >= TARGET))) {
      won = true;
      setTimeout(() => {
        document.getElementById('winScore').textContent = score;
        document.getElementById('winScreen').style.display = 'flex';
      }, 300);
    }
    // 检测失败
    if (!canMove()) {
      setTimeout(() => {
        document.getElementById('loseScore').textContent = score;
        document.getElementById('loseScreen').style.display = 'flex';
      }, 300);
    }
  }
  return moved;
}

function canMove() {
  for (let r = 0; r < 4; r++)
    for (let c = 0; c < 4; c++) {
      if (!grid[r][c]) return true;
      if (c < 3 && grid[r][c] === grid[r][c + 1]) return true;
      if (r < 3 && grid[r][c] === grid[r + 1][c]) return true;
    }
  return false;
}

function startGame() {
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('winScreen').style.display = 'none';
  document.getElementById('loseScreen').style.display = 'none';
  init();
}

/* 键盘控制 */
document.addEventListener('keydown', e => {
  const map = { ArrowUp:'up', ArrowDown:'down', ArrowLeft:'left', ArrowRight:'right', w:'up', s:'down', a:'left', d:'right' };
  if (map[e.key]) { e.preventDefault(); move(map[e.key]); }
});

/* 触屏滑动 */
let tx, ty;
document.addEventListener('touchstart', e => { tx = e.touches[0].clientX; ty = e.touches[0].clientY; });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  const dy = e.changedTouches[0].clientY - ty;
  if (Math.abs(dx) + Math.abs(dy) < 30) return;
  if (Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? 'right' : 'left');
  else move(dy > 0 ? 'down' : 'up');
});
</script>
</body>
</html>
